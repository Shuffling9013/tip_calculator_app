<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tip calculator</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./src/reset.css" />
    <link rel="stylesheet" href="./src/index.css" />
    <script type="module" src="./src/index.ts"></script>
  </head>
  <body>
    <header>
      <img src="./assets/images/logo.svg" alt="logo" />
    </header>

    <main>
      <form>
        <fieldset>
          <legend>Bill</legend>
          <div>
            <label for="bill">
              <img src="./assets/images/icon-dollar.svg" alt="bill" />
            </label>
            <input
              id="bill"
              name="bill"
              type="text"
              inputmode="decimal"
              pattern="\d+(\.\d{1,2})?$"
            />
          </div>
        </fieldset>

        <fieldset>
          <legend>Select Tip %</legend>
          <label>5%<input type="radio" name="tip" value="5" /></label>
          <label>10%<input type="radio" name="tip" value="10" /></label>
          <label>15%<input type="radio" name="tip" value="15" /></label>
          <label>25%<input type="radio" name="tip" value="25" /></label>
          <label>50%<input type="radio" name="tip" value="50" /></label>
          <label>
            Custom
            <input
              type="text"
              name="custom-tip"
              inputmode="numeric"
              pattern="\d+%?"
              placeholder="Custom"
            />
          </label>
        </fieldset>

        <fieldset>
          <legend>Number of People</legend>
          <div>
            <label for="people-count">
              <img src="./assets/images/icon-person.svg" alt="people count" />
            </label>
            <input
              id="people-count"
              name="people-count"
              type="text"
              inputmode="numeric"
              pattern="\d+"
            />
          </div>
        </fieldset>

        <section aria-label="result">
          <p>
            <span>Tip Amount<br /><small>/ person</small></span>
            <strong id="result-tip-amount">$4.2</strong>
          </p>

          <p>
            <span>Total<br /><small>/ person</small></span>
            <strong id="result-total">$42</strong>
          </p>

          <button type="reset">RESET</button>
        </section>
      </form>
    </main>
  </body>
</html>
